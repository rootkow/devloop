name: Build and Push Image

# Reusable workflow called by the per-image publish workflows and by the release
# orchestrator (release.yml). Handles checkout (workflow_run SHA pinning), GHCR
# auth, tag computation, metadata extraction, and the build/push step.
#
# The caller's github context flows through, so github.event_name and
# github.event.workflow_run.* are evaluated correctly here even though
# this workflow is triggered via workflow_call.
#
# SDK-embedding images pass build_args (SDK_VERSION) and wait_for_pypi so the
# pinned SDK is published before the image that bakes it is built.

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Short image name (e.g. devloop-poller); appended to ghcr.io/omneval/'
        required: true
        type: string
      docker_context:
        description: 'Docker build context path (relative to repo root)'
        required: true
        type: string
      dockerfile:
        description: 'Path to the Dockerfile (relative to repo root)'
        required: true
        type: string
      build_args:
        description: 'Newline-separated KEY=value build args (e.g. SDK_VERSION=0.0.2)'
        required: false
        type: string
        default: ''
      wait_for_pypi:
        description: 'If set ("pkg==version"), poll PyPI until that release is queryable before building'
        required: false
        type: string
        default: ''

jobs:
  build_and_push:
    name: Build and push ${{ inputs.image_name }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          # For workflow_run, build the exact commit whose CI just passed.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the pinned SDK to be downloadable from PyPI
        if: inputs.wait_for_pypi != ''
        run: |
          pkg_ver='${{ inputs.wait_for_pypi }}'
          name="${pkg_ver%%==*}"
          ver="${pkg_ver##*==}"
          json_url="https://pypi.org/pypi/${name}/${ver}/json"
          simple_url="https://pypi.org/simple/${name}/"
          echo "Waiting for ${pkg_ver} to appear in simple index and be downloadable"
          # Three-gate check that mirrors exactly what uv does at build time:
          #   1. JSON metadata exists (version registered on PyPI)
          #   2. Version appears in the simple index — the index uv queries for
          #      resolution. v0.0.5 failed because gates 1+3 passed but uv's
          #      resolver hit a CDN edge that hadn't propagated the simple index
          #      yet, so it only saw 0.0.1-0.0.4 and declared requirements
          #      unsatisfiable.
          #   3. Every published file HEADs 200 on files.pythonhosted.org
          #      (the same CDN uv pulls from). Checking metadata alone let the
          #      build start before the file was downloadable (see v0.0.3).
          for i in $(seq 1 40); do
            # Gate 1: JSON metadata
            file_urls=$(curl -s "$json_url" | jq -r '.urls[].url')
            if [ -z "$file_urls" ]; then
              echo "Attempt $i/40: ${pkg_ver} metadata not on PyPI yet"
              echo "Retrying in 15s"; sleep 15; continue
            fi
            # Gate 2: simple index lists the version (uv resolution gate)
            if ! curl -s "$simple_url" | grep -q "${ver}"; then
              echo "Attempt $i/40: ${ver} not in simple index yet"
              echo "Retrying in 15s"; sleep 15; continue
            fi
            # Gate 3: every file is downloadable
            all_ok=1
            for fu in $file_urls; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --head "$fu")
              if [ "$code" != "200" ]; then
                all_ok=0
                echo "Attempt $i/40: ${fu##*/} not downloadable yet (HTTP $code)"
                break
              fi
            done
            if [ "$all_ok" = "1" ]; then
              echo "All gates passed for ${pkg_ver} (attempt $i)"
              exit 0
            fi
            echo "Retrying in 15s"
            sleep 15
          done
          echo "ERROR: ${pkg_ver} did not become fully available within ~10 minutes"
          exit 1

      - name: Compute sha-<short>-<epoch> tag
        id: shatag
        run: echo "value=sha-$(git rev-parse --short=7 HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omneval/${{ inputs.image_name }}
          # sha/latest track the rolling main line (workflow_run after CI, or a
          # direct push to main). type=semver emits only on tag refs, which is
          # the release path, so it needs no explicit enable guard.
          tags: |
            type=raw,value=${{ steps.shatag.outputs.value }},enable=${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' || github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ inputs.image_name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build_args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
