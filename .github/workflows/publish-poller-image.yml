name: Publish Poller Image

# Builds and publishes ghcr.io/omneval/devloop-poller — the GitHub issue poller
# that detects `agent-ready`-labeled issues and forwards them to the Temporal
# Orchestration Worker webhook to start a Dev Loop.
#
# Triggers:
#   - push to main          → sha-<short>-<epoch> + latest tags
#   - push of a v* tag       → semver tags
#   - pull_request           → build + test only (no push)
#
# No `paths:` filter so v* release tags (which have no file delta vs main) still
# produce a semver build.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: publish-poller-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: poller tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.11"

      - name: Run tests
        working-directory: images/poller
        run: uv run pytest -q

  build_and_push:
    name: Build and push poller to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute sha-<short>-<epoch> tag
        id: shatag
        run: echo "value=sha-$(git rev-parse --short=7 HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omneval/devloop-poller
          tags: |
            type=raw,value=${{ steps.shatag.outputs.value }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push poller image
        uses: docker/build-push-action@v6
        with:
          # Context is the repo root: the Dockerfile COPYs images/poller/* paths.
          context: .
          file: ./images/poller/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
