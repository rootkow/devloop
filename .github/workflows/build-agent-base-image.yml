name: Build Agent Base Image

# Builds and publishes ghcr.io/omneval/devloop-agent-base — the shared toolchain
# base for all per-project agent images (OpenHands SDK, Temporal SDK, git, gh,
# kubectl, flux).
#
# Triggers (main only):
#   - push to main → sha-<short>-<epoch> + latest tags (SDK unpinned = latest)
#
# Release (semver) builds run in release.yml, which pins omneval-devloop to the
# tag version and waits for the PyPI publish first. This workflow deliberately
# omits a tag trigger so the two never race.

on:
  push:
    branches: [main]

concurrency:
  group: build-agent-base-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: entrypoint tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b 
        with:
          version: "0.11.18"

      # Run from the repo root so uv uses the root project (local omneval-devloop),
      # which provides devloop.shared that entrypoint.py imports — rather than the
      # image's own pyproject.toml. test_skills.py's filesystem tests exercise the
      # real openhands-sdk skill loader, so pin those two extras to the same
      # version images/agent-base/pyproject.toml builds against.
      - name: Run entrypoint tests
        run: |
          uv run --with pytest --with pytest-asyncio \
            --with openhands-sdk==1.24.0 --with openhands-tools==1.24.0 \
            pytest images/agent-base -q

  build_and_push:
    name: Build and push agent-base to GHCR
    needs: test
    # Grant the package-push scope the reusable workflow needs; the repo default
    # token is capped at packages: read.
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: devloop-agent-base
      docker_context: './images/agent-base'
      dockerfile: './images/agent-base/Dockerfile'
    secrets: inherit

  build_and_push_universal:
    name: Build and push agent-universal to GHCR
    # Sequenced after agent-base so the universal image always wraps the
    # agent-base that was just published (BASE_TAG=latest resolves on a fresh
    # runner - no stale layer cache).
    needs: build_and_push
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: devloop-agent-universal
      docker_context: './images/agent-universal'
      dockerfile: './images/agent-universal/Dockerfile'
      build_args: BASE_TAG=latest
    secrets: inherit
