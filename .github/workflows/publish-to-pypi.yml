name: Publish to PyPI

# Builds and publishes the omneval-devloop package to PyPI using uv and OIDC
# trusted publishing (no stored API token).
#
# Triggers:
#   - push of a v* tag  → build + publish to PyPI (semver)

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.11"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
