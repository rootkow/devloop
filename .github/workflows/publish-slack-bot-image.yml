name: Publish Slack Bot Image

# Builds and publishes ghcr.io/omneval/devloop-slack-bot — the Slack <-> Temporal
# bridge for Phase Gates and changelog posts.
#
# Triggers (main only):
#   - workflow_run after "CI" succeeds on main → sha-<short>-<epoch> + latest tags
#
# Depending on CI (rather than push to main directly) ensures the image is never
# pushed against a broken devloop package. Release (semver) builds run in
# release.yml; this workflow has no tag trigger so the two never race.
#
# The image installs omneval-devloop[slack] from PyPI. Continuous builds
# install the latest published release. Release builds (release.yml) pin the
# SDK to the tag version and wait for PyPI before building.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: publish-slack-bot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and push slack-bot to GHCR
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/build-image.yml
    with:
      image_name: devloop-slack-bot
      docker_context: './images/slack-bot'
      dockerfile: './images/slack-bot/Dockerfile'
    secrets: inherit
