apiVersion: v2
name: devloop
description: Helm chart for deploying the devloop Temporal Orchestration Worker
type: application
# Placeholder only. The release pipeline (release.yml) packages the chart with
# --version/--app-version set to the git tag, so the PUBLISHED chart semver always
# matches the SDK and image releases. This static value is used solely by PR lint
# and local `helm template`; it is never what gets pushed to the OCI registry.
version: 0.0.0
appVersion: "0.0.0"
dependencies:
  # Optional bundled Temporal for evaluation installs (issue #117). Disabled by
  # default — production deployments should bring their own Temporal cluster
  # with real persistence and set `temporalHost` instead.
  # Pinned to the 0.x line deliberately: it is the last one that bundles its
  # own Cassandra persistence, which is what makes a zero-prerequisite
  # `--set temporal.enabled=true` install possible on a bare cluster. The 1.x
  # charts require an externally managed database.
  - name: temporal
    version: "0.74.0"
    repository: https://go.temporal.io/helm-charts
    condition: temporal.enabled
