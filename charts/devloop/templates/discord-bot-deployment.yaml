{{- include "devloop.validate.temporalHost" . }}
{{- if .Values.discordBot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-discord-bot
  labels:
    {{- include "devloop.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-bot
spec:
  replicas: {{ .Values.discordBot.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: discord-bot
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: discord-bot
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "devloop.discordBot.serviceAccountName" . }}
      {{- with .Values.discordBot.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: discord-bot
          image: "{{ .Values.discordBot.image.repository }}:{{ .Values.discordBot.image.tag }}"
          imagePullPolicy: {{ .Values.discordBot.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.discordBot.healthPort }}
              protocol: TCP
          env:
            - name: TEMPORAL_HOST
              value: {{ .Values.temporalHost | quote }}
            - name: DISCORD_TOKEN
              {{- if .Values.discordBot.tokenSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discordBot.tokenSecret.name }}
                  key: {{ .Values.discordBot.tokenSecret.key }}
              {{- else }}
              value: {{ .Values.discordBot.token | quote }}
              {{- end }}
            {{- with .Values.discordBot.applicationIdSecret }}
            - name: DISCORD_APPLICATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .name }}
                  key: {{ .key }}
            {{- end }}
            - name: TASK_QUEUE
              value: {{ .Values.discordBot.taskQueue | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.discordBot.healthPort | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CONFIGMAP_NAME
              value: {{ .Values.discordBot.threadMapConfigMap | quote }}
            - name: DISCORD_CHANNEL_APPROVALS
              value: {{ .Values.discordBot.channels.approvals | quote }}
            - name: DISCORD_CHANNEL_ALERTS
              value: {{ .Values.discordBot.channels.alerts | quote }}
            - name: DISCORD_CHANNEL_CHANGELOG
              value: {{ .Values.discordBot.channels.changelog | quote }}
            {{- with .Values.discordBot.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- include "devloop.healthProbes" . | nindent 10 }}
          {{- if .Values.discordBot.resources }}
          resources:
            {{- toYaml .Values.discordBot.resources | nindent 12 }}
          {{- end }}
{{- end }}
