{{- if .Values.temporalWorker.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devloop.temporalWorker.serviceAccountName" . }}
  labels:
    {{- include "devloop.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-worker
  {{- with .Values.temporalWorker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.temporalWorker.agentJob.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devloop.agentJob.serviceAccountName" . }}
  labels:
    {{- include "devloop.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-job
  {{- with .Values.temporalWorker.agentJob.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
