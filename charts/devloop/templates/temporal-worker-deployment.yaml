{{- include "devloop.validate.temporalHost" . }}
{{- if .Values.temporalWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-temporal-worker
  labels:
    {{- include "devloop.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-worker
spec:
  replicas: {{ .Values.temporalWorker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: temporal-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: temporal-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "devloop.temporalWorker.serviceAccountName" . }}
      {{- with .Values.temporalWorker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.temporalWorker.projectsConfigMap.name }}
      volumes:
        - name: projects-config
          configMap:
            name: {{ . }}
      {{- end }}
      containers:
        - name: temporal-worker
          image: "{{ .Values.temporalWorker.image.repository }}:{{ .Values.temporalWorker.image.tag }}"
          imagePullPolicy: {{ .Values.temporalWorker.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.temporalWorker.healthPort }}
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.temporalWorker.webhookPort }}
              protocol: TCP
          env:
            - name: TEMPORAL_HOST
              value: {{ include "devloop.temporalHost" . | quote }}
            - name: AGENTS_NAMESPACE
              value: {{ .Values.agentsNamespace | default .Release.Namespace | quote }}
            - name: TASK_QUEUE
              value: {{ .Values.temporalWorker.taskQueue | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.temporalWorker.healthPort | quote }}
            - name: WEBHOOK_PORT
              value: {{ .Values.temporalWorker.webhookPort | quote }}
            - name: PROJECTS_FILE
              value: {{ .Values.temporalWorker.projectsFile | quote }}
            - name: MAX_QUESTIONS_PER_PHASE
              value: {{ .Values.temporalWorker.maxQuestionsPerPhase | default 3 | quote }}
            - name: CI_FIX_MAX_ITERATIONS
              value: {{ .Values.temporalWorker.ciFixMaxIterations | default 5 | quote }}
            - name: EXECUTE_MAX_ITERATIONS
              value: {{ .Values.temporalWorker.executeMaxIterations | default 1 | quote }}
            - name: REVIEW_FIX_MAX_ITERATIONS
              value: {{ .Values.temporalWorker.reviewFixMaxIterations | default 1 | quote }}
            - name: AGENT_CRITERIA_MAX_PASSES
              value: {{ .Values.temporalWorker.agentCriteriaMaxPasses | default 2 | quote }}
            - name: MAX_CONCURRENT_JOBS
              value: {{ .Values.temporalWorker.maxConcurrentJobs | default 1 | quote }}
            - name: AGENT_GITHUB_LOGIN
              value: {{ .Values.temporalWorker.agentGithubLogin | default "devloop-bot" | quote }}
            {{- if .Values.temporalWorker.githubWebhookSecret.name }}
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.temporalWorker.githubWebhookSecret.name }}
                  key: {{ .Values.temporalWorker.githubWebhookSecret.key }}
            {{- end }}
            {{- with .Values.githubApp.appId }}
            - name: GITHUB_APP_ID
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.githubApp.privateKeySecret.name }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.githubApp.privateKeySecret.name }}
                  key: {{ .Values.githubApp.privateKeySecret.key }}
            {{- end }}
            {{- with .Values.githubApp.installationId }}
            - name: GITHUB_APP_INSTALLATION_ID
              value: {{ . | quote }}
            {{- end }}
            - name: GIT_AUTHOR_NAME
              value: {{ .Values.agent.gitName | default "devloop-bot" | quote }}
            - name: GIT_AUTHOR_EMAIL
              value: {{ .Values.agent.gitEmail | default "devloop-bot@omneval.com" | quote }}
            - name: SUMMARIZATION_ENABLED
              value: {{ .Values.summarization.enabled | default true | quote }}
            - name: SUMMARIZATION_CRON_SCHEDULE
              value: {{ .Values.summarization.cronSchedule | default "0 8 * * 1" | quote }}
            {{- with .Values.summarization.webhookUrl }}
            - name: SUMMARIZATION_WEBHOOK_URL
              value: {{ . | quote }}
            {{- end }}
            - name: CODE_QUALITY_ENABLED
              value: {{ .Values.codeQuality.enabled | default false | quote }}
            - name: CODE_QUALITY_CRON_SCHEDULE
              value: {{ .Values.codeQuality.cronSchedule | default "0 3 * * 0" | quote }}
            - name: CODE_QUALITY_THRESHOLD
              value: {{ .Values.codeQuality.qualityThreshold | default 7000 | quote }}
            - name: CODE_QUALITY_AGENT_LABEL
              value: {{ .Values.codeQuality.agentLabel | default "agent-ready" | quote }}
            {{- if .Values.skillsByPhase }}
            - name: AGENT_SKILLS_BY_PHASE
              value: {{ .Values.skillsByPhase | toJson | quote }}
            {{- end }}
            - name: AGENT_SKILLS_SELECTION_MODE
              value: {{ .Values.skillsSelectionMode | default "triggers" | quote }}
            {{- if .Values.skills }}
            - name: AGENT_SKILLS_CONFIGMAP
              value: {{ printf "%s-skills" .Release.Name | quote }}
            {{- end }}
            - name: ORCHESTRATION_QUEUE
              value: {{ .Values.temporalWorker.taskQueue | quote }}
            - name: AGENT_JOB_SERVICE_ACCOUNT
              value: {{ include "devloop.agentJob.serviceAccountName" . | quote }}
            - name: AGENT_JOB_ACTIVE_DEADLINE
              value: {{ .Values.temporalWorker.agentJob.maxAgentRuntime | default 7200 | quote }}
            # Fallback image for projects whose registry entry omits
            # agent_image. The default pairs the universal image with the
            # chart appVersion (the release pipeline tags both identically).
            - name: AGENT_DEFAULT_IMAGE
              value: {{ .Values.temporalWorker.agentJob.defaultImage | default (printf "ghcr.io/omneval/devloop-agent-universal:%s" .Chart.AppVersion) | quote }}
            {{- with .Values.temporalWorker.agentJob.runner }}
            - name: AGENT_RUNNER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.resources.requests.cpu }}
            - name: AGENT_JOB_CPU
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.resources.requests.memory }}
            - name: AGENT_JOB_MEMORY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.resources.limits.cpu }}
            - name: AGENT_JOB_CPU_LIMIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.resources.limits.memory }}
            - name: AGENT_JOB_MEMORY_LIMIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.llm.model }}
            - name: AGENT_MODEL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.temporalWorker.agentJob.llm.baseUrl }}
            - name: AGENT_LLM_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.temporalWorker.agentJob.llm.apiKeySecret.name }}
            - name: AGENT_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.temporalWorker.agentJob.llm.apiKeySecret.name }}
                  key: {{ .Values.temporalWorker.agentJob.llm.apiKeySecret.key }}
            {{- else if .Values.temporalWorker.agentJob.llm.apiKey }}
            - name: AGENT_LLM_API_KEY
              value: {{ .Values.temporalWorker.agentJob.llm.apiKey | quote }}
            {{- end }}
            {{- range $role, $cfg := (.Values.temporalWorker.agentJob.llm.roles | default dict) }}
            {{- $suffix := upper $role }}
            {{- with $cfg.model }}
            - name: AGENT_MODEL_{{ $suffix }}
              value: {{ . | quote }}
            {{- end }}
            {{- with $cfg.baseUrl }}
            - name: AGENT_LLM_BASE_URL_{{ $suffix }}
              value: {{ . | quote }}
            {{- end }}
            {{- if and $cfg.apiKeySecret $cfg.apiKeySecret.name }}
            - name: AGENT_LLM_API_KEY_{{ $suffix }}
              valueFrom:
                secretKeyRef:
                  name: {{ $cfg.apiKeySecret.name }}
                  key: {{ $cfg.apiKeySecret.key }}
            {{- else if $cfg.apiKey }}
            - name: AGENT_LLM_API_KEY_{{ $suffix }}
              value: {{ $cfg.apiKey | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.temporalWorker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.temporalWorker.projectsConfigMap.name }}
          volumeMounts:
            - name: projects-config
              mountPath: {{ $.Values.temporalWorker.projectsFile | quote }}
              subPath: {{ $.Values.temporalWorker.projectsConfigMap.key | default "projects.yaml" | quote }}
          {{- end }}
          {{- include "devloop.healthProbes" . | nindent 10 }}
          {{- if .Values.temporalWorker.resources }}
          resources:
            {{- toYaml .Values.temporalWorker.resources | nindent 12 }}
          {{- end }}
{{- end }}
