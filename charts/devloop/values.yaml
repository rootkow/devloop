# Required: Temporal server address (host:port).
# The chart does NOT deploy Temporal — the consumer must provide it.
# Example: "temporal-frontend.agents.svc:7233"
temporalHost: ""

# Namespace where Agent Execution Jobs (and their output ConfigMaps) are created.
# Defaults to the Helm release namespace (.Release.Namespace) so that a standard
# install lands everything in the same namespace.  Advanced operators can override
# this to isolate agent workloads in a dedicated namespace (note: the worker's
# ServiceAccount must have Job and ConfigMap RBAC in the target namespace).
agentsNamespace: ""

# ---------------------------------------------------------------------------
# Agent Skills
# ---------------------------------------------------------------------------
# Per-phase allowlist of skill names that Agent Execution Jobs may load.
# Semantics:
#   - Key absent  → all installed skills are available for that phase.
#   - Key = []    → no skills are available for that phase.
#   - Key = names → exactly those installed skills are available.
# Example:
#   skillsByPhase:
#     plan: []
#     execute: [tdd, code-review]
#     remediation: [tdd]
#     review: [code-review, security-review]
skillsByPhase: {}

# Skill selection mode for Agent Execution Jobs.
#   "triggers"  — keyword-driven (default): the agent uses a skill only when
#                 the conversation matches the skill's triggers: frontmatter.
#   "advanced"  — model-driven: all eligible skills are surfaced to the model
#                 so it can select the most appropriate one autonomously.
skillsSelectionMode: "triggers"

# ---------------------------------------------------------------------------
# Temporal Orchestration Worker
# ---------------------------------------------------------------------------
temporalWorker:
  enabled: true
  image:
    repository: ghcr.io/omneval/devloop-temporal-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  # ServiceAccount for the temporal-worker pod.
  # When create: true, the chart creates the SA, a Role with the permissions
  # required to spawn Agent Execution Jobs (batch/jobs, configmaps, pods/log,
  # secrets), and a RoleBinding in the release namespace.
  serviceAccount:
    create: true
    name: ""         # defaults to <release>-temporal-worker
    annotations: {}
  # Image pull secrets (e.g. when the worker image lives in a private registry).
  imagePullSecrets: []
  #   - name: regcred
  # Agent Execution Job configuration — settings for the Kubernetes Jobs the
  # worker spawns for each Dev Loop phase.
  agentJob:
    # ServiceAccount assigned to each spawned Agent Execution Job pod.
    # When create: true, the chart creates the SA, a Role (configmaps
    # create/get/update/patch), and a RoleBinding in the release namespace.
    serviceAccount:
      create: true
      name: ""       # defaults to <release>-agent-job
      annotations: {}
    # Resource requests and limits for each spawned Agent Execution Job pod.
    # Mirrors the standard Kubernetes resources structure. Omit a section (or
    # leave values empty) to fall back to the application defaults
    # (requests: cpu "2", memory "4Gi"; no CPU limit; memory limit = request).
    resources:
      requests:
        cpu: "500m"      # AGENT_JOB_CPU          — e.g. "500m"
        memory: "500Mi"   # AGENT_JOB_MEMORY        — e.g. "2Gi"
      limits:
        cpu: "1"      # AGENT_JOB_CPU_LIMIT     — e.g. "1"; omit for no CPU limit
        memory: "2Gi"   # AGENT_JOB_MEMORY_LIMIT  — e.g. "2Gi"
    # LLM connection details forwarded to every Agent Execution Job.
    llm:
      model: ""           # AGENT_MODEL — e.g. "openai/gpt-4o"
      baseUrl: ""         # AGENT_LLM_BASE_URL — LiteLLM-style base URL
      apiKey: ""          # AGENT_LLM_API_KEY — prefer apiKeySecret for production
      # apiKeySecret: { name: "llm-credentials", key: "api-key" }
      apiKeySecret: {}
  # Extra environment variables appended verbatim to the container. Use this for
  # consumer-specific config (custom workflow settings, etc.).
  # ORCHESTRATION_QUEUE, AGENT_JOB_SERVICE_ACCOUNT, and AGENT_*_LLM_* vars are
  # now first-class values above — they no longer need to go here.
  extraEnv: []
  #   - name: AGENT_MODEL
  #     value: "openai/my-model"
  # Resource limits for the worker container
  resources: {}
  #   requests:
  #     cpu: 250m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  # Task queue name. The webhook and the worker both read ORCHESTRATION_QUEUE
  # from this value — keep them in sync by only changing it here.
  taskQueue: "devloop-orchestration"
  # Health probe port
  healthPort: 8080
  # Webhook receiver port
  webhookPort: 8088
  # Path to projects registry file (mounted as ConfigMap or secret)
  projectsFile: "/etc/projects/projects.yaml"
  # Human-approval gate timeout, in seconds, for the plan and merge gates.
  # When a gate waits this long without a reply the loop stops blocking: the
  # plan gate pauses the run and the merge gate leaves the PR open and moves on.
  # Without it a forgotten approval parks the run forever and (because the
  # webhook reuses the devloop-<project> workflow id) silently drops later
  # issues. Mirrors DevLoopInput.gate_timeout_seconds — keep the two in sync.
  # Default: 14400 (4h).
  gateTimeoutSeconds: 14400
  # Timeout, in seconds, for a mid-run clarifying question gate.
  # Mirrors DevLoopInput.question_timeout_seconds. Default: 14400 (4h).
  questionTimeoutSeconds: 14400
  # Replica count
  replicas: 1

# ---------------------------------------------------------------------------
# Discord Bot
# ---------------------------------------------------------------------------
discordBot:
  enabled: true
  image:
    repository: ghcr.io/omneval/devloop-discord-bot
    tag: "latest"
    pullPolicy: IfNotPresent
  # Discord bot token. Prefer `tokenSecret` (a Kubernetes Secret reference) over
  # the plain `token` value, which is only suitable for local/dev use.
  token: ""
  # tokenSecret: { name: "discord-bot", key: "TOKEN" }
  tokenSecret: {}
  # Optional Discord application ID, sourced from a Secret the same way.
  # applicationIdSecret: { name: "discord-bot", key: "APPLICATION_ID" }
  applicationIdSecret: {}
  # ServiceAccount for the discord-bot pod.
  # When create: true, the chart creates the SA, a Role allowing the bot to
  # create and update the thread-map ConfigMap, and a RoleBinding.
  serviceAccount:
    create: true
    name: ""         # defaults to <release>-discord-bot
    annotations: {}
  # Image pull secrets for a private bot image.
  imagePullSecrets: []
  # Name of the pre-existing ConfigMap used to persist workflow↔thread mappings.
  # The chart injects this as CONFIGMAP_NAME and K8S_NAMESPACE automatically so
  # operators no longer need extraEnv for either.
  threadMapConfigMap: "discord-bot-threads"
  # Discord channel IDs for each notification category.
  # Run: discord channel → "Copy ID" (Developer Mode must be enabled).
  channels:
    approvals: ""    # DISCORD_CHANNEL_APPROVALS — where plan/merge gates are posted
    alerts: ""       # DISCORD_CHANNEL_ALERTS    — where alert notifications land
    changelog: ""    # DISCORD_CHANNEL_CHANGELOG — where summaries are posted
  # Extra environment variables appended verbatim (e.g. non-standard channel names).
  # Channel IDs are now first-class values above — they no longer need extraEnv.
  extraEnv: []
  # Resource limits
  resources: {}
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     cpu: 200m
  #     memory: 256Mi
  # Task queue for discord-bot activities
  taskQueue: "discord-bot"
  # Health probe port
  healthPort: 8080
  # Replica count
  replicas: 1

# ---------------------------------------------------------------------------
# GitHub Issue Poller(s)
# ---------------------------------------------------------------------------
# Each entry creates a separate poller deployment for one repository.
# GITHUB_TOKEN is shared across all pollers; repo-specific fields are per-entry.
poller:
  enabled: true
  # Shared GitHub token for all poller instances. Prefer `githubTokenSecret`
  # (a Kubernetes Secret reference) over the plain `githubToken` value.
  githubToken: ""
  # githubTokenSecret: { name: "agent-github-token", key: "GITHUB_TOKEN" }
  githubTokenSecret: {}
  image:
    repository: ghcr.io/omneval/devloop-poller
    tag: "latest"
    pullPolicy: IfNotPresent
  # Image pull secrets for a private poller image.
  imagePullSecrets: []
  # Resource limits (applied to all poller instances)
  resources: {}
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi
  # Health probe port
  healthPort: 8080
  # Seconds between poll cycles
  pollIntervalSeconds: 300
  # List of project configs. Each creates one poller deployment.
  #   - repo:       full GitHub repo name (e.g. "omneval/omneval")
  #   - label:      the agent trigger label (default: "agent-ready")
  #   - webhookUrl: URL of the temporal-worker webhook endpoint
  projects: []
  #   - repo: "org/repo"
  #     label: "agent-ready"
  #     webhookUrl: "http://devloop-temporal-worker.default.svc.cluster.local:8088/webhook/github"
