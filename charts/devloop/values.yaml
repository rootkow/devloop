# Temporal server address (host:port).
# Required unless temporal.enabled=true (the bundled evaluation subchart below),
# in which case it defaults to the subchart's frontend Service. An explicit
# value here always wins.
# Example: "temporal-frontend.agents.svc:7233"
temporalHost: ""

# ---------------------------------------------------------------------------
# Bundled Temporal subchart (evaluation convenience, issue #117)
# ---------------------------------------------------------------------------
# When enabled, the official temporalio `temporal` chart is deployed alongside
# devloop and `temporalHost` defaults to its frontend Service, so a bare
#   helm install devloop ... --set temporal.enabled=true
# yields a working Dev Loop on a fresh cluster with no separate Temporal
# install. Disabled by default — existing consumers see zero change.
#
# Production recommendation: run Temporal externally with real persistence
# (see docs/temporal-prerequisites.md) and set `temporalHost` instead. The
# defaults below are the upstream chart's minimal single-node evaluation
# profile (one server replica, single-node Cassandra, no Elasticsearch /
# Prometheus / Grafana).
temporal:
  enabled: false
  server:
    replicaCount: 1
  cassandra:
    config:
      cluster_size: 1
  elasticsearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false

# Namespace where Agent Execution Jobs (and their output ConfigMaps) are created.
# Defaults to the Helm release namespace (.Release.Namespace) so that a standard
# install lands everything in the same namespace.  Advanced operators can override
# this to isolate agent workloads in a dedicated namespace (note: the worker's
# ServiceAccount must have Job and ConfigMap RBAC in the target namespace).
agentsNamespace: ""

# ---------------------------------------------------------------------------
# Agent Skills
# ---------------------------------------------------------------------------
# Per-phase allowlist of skill names that Agent Execution Jobs may load.
# Semantics:
#   - Key absent  → all installed skills are available for that phase.
#   - Key = []    → no skills are available for that phase.
#   - Key = names → exactly those installed skills are available.
# Example:
#   skillsByPhase:
#     plan: []
#     execute: [tdd, code-review]
#     ci_fix: [tdd]
#     review: [code-review, security-review]
skillsByPhase: {}

# Skill selection mode for Agent Execution Jobs.
#   "triggers"  — keyword-driven (default): the agent uses a skill only when
#                 the conversation matches the skill's triggers: frontmatter.
#   "advanced"  — model-driven: all eligible skills are surfaced to the model
#                 so it can select the most appropriate one autonomously.
skillsSelectionMode: "triggers"

# ---------------------------------------------------------------------------
# Temporal Orchestration Worker
# ---------------------------------------------------------------------------
temporalWorker:
  enabled: true
  image:
    repository: ghcr.io/omneval/devloop-temporal-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  # ServiceAccount for the temporal-worker pod.
  # When create: true, the chart creates the SA, a Role with the permissions
  # required to spawn Agent Execution Jobs (batch/jobs, configmaps, pods/log,
  # secrets), and a RoleBinding in the release namespace.
  serviceAccount:
    create: true
    name: ""         # defaults to <release>-temporal-worker
    annotations: {}
  # Image pull secrets (e.g. when the worker image lives in a private registry).
  imagePullSecrets: []
  #   - name: regcred
  # Agent Execution Job configuration — settings for the Kubernetes Jobs the
  # worker spawns for each Dev Loop phase.
  agentJob:
    # Image used for a project whose registry entry omits agent_image.
    # Defaults to the published devloop-agent-universal matching the chart
    # appVersion — the batteries-included toolchain image (Go, Node, Helm on
    # top of agent-base), so enrolling a project requires no image build.
    # Forwarded to the worker as AGENT_DEFAULT_IMAGE.
    defaultImage: ""
    # Agent runner harness for Agent Execution Jobs (issue #121, ADR-0011):
    # "openhands" (the default when empty) drives any OpenAI-compatible
    # endpoint via the OpenHands SDK; "claude-agent-sdk" drives Anthropic
    # models via their native harness (requires a derived agent image with
    # the claude-agent-sdk package + Claude Code CLI, and an Anthropic key in
    # agentJob.llm.apiKey/apiKeySecret). Forwarded as AGENT_RUNNER; a
    # project's registry entry can override per-project via `agent_runner`.
    runner: ""
    # ServiceAccount assigned to each spawned Agent Execution Job pod.
    # When create: true, the chart creates the SA, a Role (configmaps
    # create/get/update/patch), and a RoleBinding in the release namespace.
    serviceAccount:
      create: true
      name: ""       # defaults to <release>-agent-job
      annotations: {}
    # Maximum wall-clock seconds an Agent Execution Job pod is allowed to run
    # before Kubernetes terminates it (activeDeadlineSeconds). Forwarded as
    # AGENT_JOB_ACTIVE_DEADLINE. The Temporal activity timeout is derived from
    # this value internally (deadline + 90s buffer) so the workflow always
    # outlasts the pod and can detect failure cleanly. Default: 7200 (2 hours).
    maxAgentRuntime: 7200
    # Resource requests and limits for each spawned Agent Execution Job pod.
    # Mirrors the standard Kubernetes resources structure. Omit a section (or
    # leave values empty) to fall back to the application defaults
    # (requests: cpu "2", memory "4Gi"; no CPU limit; memory limit = request).
    #
    # Sizing note: every job does a git clone + dependency install (npm ci /
    # go build / uv sync) + a full test run. A CPU *limit* throttles all of
    # that (compile and test latency directly slows the agent's feedback
    # loop and eats into maxAgentRuntime), so no CPU limit is set by default —
    # CPU is compressible and the request already guarantees fair scheduling.
    resources:
      requests:
        cpu: "2"        # AGENT_JOB_CPU           — e.g. "2"
        memory: "4Gi"   # AGENT_JOB_MEMORY        — e.g. "4Gi"
      limits:
        # cpu: "4"      # AGENT_JOB_CPU_LIMIT     — omitted: no CPU throttling
        memory: "4Gi"   # AGENT_JOB_MEMORY_LIMIT  — e.g. "4Gi"
    # Egress lockdown for Agent Execution Job pods (issue #123).
    #
    # Agent jobs execute code from the enrolled repo (install scripts, tests,
    # the agent's own commands) while holding a push-capable GitHub token and
    # an omneval ingest key — see docs/security-model.md for the full threat
    # model. This NetworkPolicy restricts their egress to:
    #   - DNS (53/UDP+TCP)
    #   - HTTPS (443/TCP) — GitHub and package registries publish no stable
    #     CIDRs, and a vanilla NetworkPolicy is L3/L4 only, so HTTPS is
    #     allowed by port rather than by hostname. Hostname-level pinning
    #     (e.g. *.github.com only) needs a CNI policy engine such as Cilium —
    #     the agents.homelab/project and agents.homelab/phase pod labels are
    #     the selector surface for that.
    #   - the Kubernetes API on 6443/TCP (the Job writes its result
    #     ConfigMap through the API; 443-fronted API servers are already
    #     covered by the HTTPS rule)
    #   - every port parsed from llm.baseUrl and llm.roles.*.baseUrl
    #   - the port of otlpEndpoint below (omneval trace ingest)
    # Everything else is denied. Takes effect only where a NetworkPolicy-
    # enforcing CNI runs; on clusters without one it renders inert.
    networkPolicy:
      # Opt-out: set false to skip rendering the policy entirely.
      enabled: true
      # OTLP trace ingest endpoint the agent jobs export spans to. Must
      # mirror the worker's OTEL_EXPORTER_OTLP_ENDPOINT / OMNEVAL_OTLP_ENDPOINT
      # (this default matches the worker's built-in default).
      otlpEndpoint: "http://omneval-ingest.omneval.svc.cluster.local:8000"
      # Extra egress rules appended verbatim to the policy (standard
      # NetworkPolicyEgressRule objects) — the escape hatch for clusters with
      # e.g. an HTTP-only package mirror or a nonstandard API server port.
      extraEgress: []
    # LLM connection details forwarded to every Agent Execution Job.
    llm:
      model: ""           # AGENT_MODEL — e.g. "openai/gpt-4o"
      baseUrl: ""         # AGENT_LLM_BASE_URL — LiteLLM-style base URL
      apiKey: ""          # AGENT_LLM_API_KEY — prefer apiKeySecret for production
      # apiKeySecret: { name: "llm-credentials", key: "api-key" }
      apiKeySecret: {}
      # Optional per-role LLM overrides. Recognized roles:
      #   review  — the Review-phase agent
      #   audit   — the execute-phase acceptance-criteria audit
      #   extract — structured output extraction (plan/review/diagnosis JSON)
      # Each role accepts the same model/baseUrl/apiKey/apiKeySecret keys as
      # the base llm block and falls back to it per-setting when unset.
      # Forwarded to Agent Execution Jobs as AGENT_MODEL_<ROLE>,
      # AGENT_LLM_BASE_URL_<ROLE>, AGENT_LLM_API_KEY_<ROLE>.
      #
      # Why: routing review/audit to a *different* model than the implementer
      # gives cross-model review — a model's blind spots don't audit
      # themselves. A typical setup keeps execute on a local endpoint and
      # points review/audit at a hosted frontier model (these calls are small:
      # one diff + issue per phase). The endpoint must support response_format
      # with JSON schema, like the base one.
      # Example:
      #   roles:
      #     review:
      #       model: "anthropic/claude-sonnet-4-6"
      #       baseUrl: "https://api.anthropic.com/v1/"
      #       apiKeySecret: { name: "anthropic-credentials", key: "api-key" }
      #     audit:
      #       model: "anthropic/claude-haiku-4-5"
      #       baseUrl: "https://api.anthropic.com/v1/"
      #       apiKeySecret: { name: "anthropic-credentials", key: "api-key" }
      roles: {}
  # Extra environment variables appended verbatim to the container. Use this for
  # consumer-specific config (custom workflow settings, etc.).
  # ORCHESTRATION_QUEUE, AGENT_JOB_SERVICE_ACCOUNT, and AGENT_*_LLM_* vars are
  # now first-class values above — they no longer need to go here.
  extraEnv: []
  #   - name: AGENT_MODEL
  #     value: "openai/my-model"
  # Resource limits for the worker container
  resources: {}
  #   requests:
  #     cpu: 250m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  # Task queue name. The webhook and the worker both read ORCHESTRATION_QUEUE
  # from this value — keep them in sync by only changing it here.
  taskQueue: "devloop-orchestration"
  # Health probe port
  healthPort: 8080
  # Webhook receiver port
  webhookPort: 8088
  # Path to projects registry file (mounted as ConfigMap or secret)
  projectsFile: "/etc/projects/projects.yaml"
  # ConfigMap supplying the projects.yaml the chart mounts at .projectsFile —
  # the chart-native alternative to baking a registry into a custom image.
  # When name is set, the chart mounts key (a single-file subPath) at
  # .projectsFile; when unset, the operator is responsible for getting a file
  # to that path themselves (e.g. a custom image, as before this was added).
  projectsConfigMap:
    name: ""
    key: "projects.yaml"
  # Maximum number of mid-run AWAITING_HUMAN questions a single phase run may
  # spawn Phase.ANSWER agent jobs for before the workflow stops asking and
  # tells the parked job to proceed with its best guess.
  # Mirrors DevLoopInput.max_questions_per_phase. Default: 3.
  maxQuestionsPerPhase: 3
  # Maximum number of Phase.CI_FIX retry attempts the _ci_fix_loop will spend
  # trying to turn a PR's failing CI checks green before giving up and handing
  # it to the human reviewer with a "CI still failing" note.
  # Mirrors DevLoopInput.ci_fix_max_iterations. Default: 5.
  ciFixMaxIterations: 5
  # Maximum number of Execute Agent Execution Job dispatch attempts the
  # _execute_phase retry loop will spend when a dispatch produces zero commits,
  # before parking the issue with a "skipping this round" comment.
  # Mirrors DevLoopInput.execute_max_iterations. Default: 1.
  executeMaxIterations: 1
  # Maximum number of review fix passes: when the Review phase verdict is
  # needs_fixes, the workflow dispatches a Phase.PR_COMMENT fix job with the
  # reviewer's findings and re-reviews, up to this many times, before handing
  # the PR to the human reviewer.
  # Mirrors DevLoopInput.review_fix_max_iterations. Default: 1.
  reviewFixMaxIterations: 1
  # Maximum number of extra Execute-phase agent passes spent addressing unmet
  # acceptance criteria reported by the automated criteria audit (the
  # entrypoint compares the diff against the issue's acceptance criteria after
  # each pass). Forwarded to Agent Execution Jobs as AGENT_CRITERIA_MAX_PASSES.
  agentCriteriaMaxPasses: 2
  # Maximum number of Agent Execution Job dispatches (and LLM-bearing activities)
  # that may run concurrently across all workflow types and projects.
  # Forwarded to the job-dispatch Worker as MAX_CONCURRENT_JOBS.
  # Set higher when the inference backend can serve multiple requests in parallel.
  maxConcurrentJobs: 1
  # GitHub login of the devloop-bot account. Used by the webhook receiver to
  # filter out the bot's own comments/reviews so they don't re-trigger
  # PRCommentWorkflow. Forwarded to the worker as AGENT_GITHUB_LOGIN.
  agentGithubLogin: "devloop-bot"
  # Replica count
  replicas: 1

# ---------------------------------------------------------------------------
# GitHub App authentication (issue #81)
# ---------------------------------------------------------------------------
# Recommended replacement for the per-project fine-grained PAT
# (`github_token_secret`): devloop-bot authenticates as a GitHub App and mints
# short-lived (1h) installation access tokens on demand from an RSA private
# key, refreshed 5 minutes before they expire. See docs/github-app.md for the
# app manifest / required permission set (Contents rw, Pull requests rw,
# Issues rw, Checks read) and full setup instructions.
#
# Opt-in and fully backward compatible: devloop only switches to GitHub App
# auth when BOTH appId and privateKeySecret resolve to a non-empty value —
# otherwise it falls back to each project's `github_token_secret` PAT exactly
# as before. Leave this section empty/unset to keep using PATs.
githubApp:
  # GitHub App ID (shown on the app's settings page). Forwarded as
  # GITHUB_APP_ID.
  appId: ""
  # Reference to a K8s Secret holding the App's RSA private key (the .pem
  # downloaded when generating a private key for the app). Forwarded as
  # GITHUB_APP_PRIVATE_KEY via secretKeyRef.
  # privateKeySecret: { name: devloop-github-app-key, key: privateKey }
  privateKeySecret: {}
  # Installation ID selecting which installation of the app to mint tokens
  # for (the numeric segment of
  # https://github.com/settings/installations/<installation_id>). Forwarded
  # as GITHUB_APP_INSTALLATION_ID.
  installationId: ""

# ---------------------------------------------------------------------------
# Agent Execution Job identity
# ---------------------------------------------------------------------------
# Git author identity used by Agent Execution Jobs when committing to enrolled
# repositories. Forwarded to the agent container as GIT_AUTHOR_NAME /
# GIT_AUTHOR_EMAIL (consumed by `git config user.name` / `user.email`).
agent:
  gitName: "devloop-bot"
  gitEmail: "devloop-bot@omneval.com"

# ---------------------------------------------------------------------------
# Weekly Summarization
# ---------------------------------------------------------------------------
# Controls the weekly Summarization workflow / Temporal Schedule (issue #24, #79).
# Delivery defaults to opening a GitHub Issue (label `devloop-summary`, opened by
# devloop-bot) on each enrolled repo — no extra config required. An optional
# outbound webhook can also receive the digest as JSON for push notifications.
summarization:
  # When false, ensure_schedules does not create the weekly summarization
  # schedule for any project — and deletes any existing one.
  enabled: true
  # 5-field cron expression (minute hour day-of-month month day-of-week).
  # Forwarded to the Temporal ScheduleCalendarSpec (or parsed into one).
  # Default: Monday 08:00. Only plain integers and "*" are supported per field;
  # anything richer falls back to the default Monday-08:00 schedule.
  cronSchedule: "0 8 * * 1"
  # Optional outbound webhook URL. When set, `publish_summary` POSTs
  # {"project_id": ..., "summary": ..., "date": ...} as JSON to this URL in
  # addition to opening the GitHub Issue (fire-and-forget; failures are logged
  # but do not fail the workflow). Forwarded as SUMMARIZATION_WEBHOOK_URL.
  webhookUrl: ""

# ---------------------------------------------------------------------------
# Code Quality Workflow
# ---------------------------------------------------------------------------
# Controls the scheduled CodeQualityWorkflow / Temporal Schedule (issue #82).
# Runs sentrux against enrolled repos on a schedule and files improvement
# issues via the improve-codebase-architecture + to-issues skills when the
# quality score falls below the threshold.
# Requires a .sentrux/rules.toml in each enrolled repo — see docs/sentrux.md.
codeQuality:
  # When false, ensure_schedules does not create the code quality schedule
  # for any project — and deletes any existing one.
  enabled: false
  # 5-field cron expression. Default: weekly Sunday 03:00.
  cronSchedule: "0 3 * * 0"
  # Quality threshold on the native sentrux 0–10000 scale.
  # Scores below this value trigger the improve phase.
  qualityThreshold: 7000
  # Label applied to improvement issues filed by the improve phase.
  # Must match a label that exists on the enrolled repo.
  agentLabel: "agent-ready"

