# Required: Temporal server address (host:port).
# The chart does NOT deploy Temporal — the consumer must provide it.
# Example: "temporal-frontend.agents.svc:7233"
temporalHost: ""

# ---------------------------------------------------------------------------
# Agent Skills
# ---------------------------------------------------------------------------
# Per-phase allowlist of skill names that Agent Execution Jobs may load.
# Semantics:
#   - Key absent  → all installed skills are available for that phase.
#   - Key = []    → no skills are available for that phase.
#   - Key = names → exactly those installed skills are available.
# Example:
#   skillsByPhase:
#     plan: []
#     execute: [tdd, code-review]
#     review: [code-review, security-review]
skillsByPhase: {}

# Skill selection mode for Agent Execution Jobs.
#   "triggers"  — keyword-driven (default): the agent uses a skill only when
#                 the conversation matches the skill's triggers: frontmatter.
#   "advanced"  — model-driven: all eligible skills are surfaced to the model
#                 so it can select the most appropriate one autonomously.
skillsSelectionMode: "triggers"

# ---------------------------------------------------------------------------
# Temporal Orchestration Worker
# ---------------------------------------------------------------------------
temporalWorker:
  enabled: true
  image:
    repository: ghcr.io/omneval/devloop-temporal-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  # Name of a pre-existing ServiceAccount to run the pod as (e.g. one bound to a
  # Role that can create Agent Execution Jobs). Empty uses the namespace default.
  serviceAccountName: ""
  # Image pull secrets (e.g. when the worker image lives in a private registry).
  imagePullSecrets: []
  #   - name: regcred
  # Extra environment variables appended verbatim to the container. Use this for
  # consumer-specific config (alternate task queues, custom workflow settings,
  # agent LLM endpoints, etc.). Entries are standard core/v1 EnvVar objects.
  extraEnv: []
  #   - name: ORCHESTRATION_QUEUE
  #     value: "homelab-orchestration"
  #   - name: AGENT_MODEL
  #     value: "openai/my-model"
  # Resource limits for the worker container
  resources: {}
  #   requests:
  #     cpu: 250m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  # Task queue name
  taskQueue: "homelab-orchestration"
  # Health probe port
  healthPort: 8080
  # Webhook receiver port
  webhookPort: 8088
  # Path to projects registry file (mounted as ConfigMap or secret)
  projectsFile: "/etc/projects/projects.yaml"
  # Replica count
  replicas: 1

# ---------------------------------------------------------------------------
# Discord Bot
# ---------------------------------------------------------------------------
discordBot:
  enabled: true
  image:
    repository: ghcr.io/omneval/devloop-discord-bot
    tag: "latest"
    pullPolicy: IfNotPresent
  # Discord bot token. Prefer `tokenSecret` (a Kubernetes Secret reference) over
  # the plain `token` value, which is only suitable for local/dev use.
  token: ""
  # tokenSecret: { name: "discord-bot", key: "TOKEN" }
  tokenSecret: {}
  # Optional Discord application ID, sourced from a Secret the same way.
  # applicationIdSecret: { name: "discord-bot", key: "APPLICATION_ID" }
  applicationIdSecret: {}
  # Name of a pre-existing ServiceAccount (e.g. one allowed to read/write the
  # thread-map ConfigMap). Empty uses the namespace default.
  serviceAccountName: ""
  # Image pull secrets for a private bot image.
  imagePullSecrets: []
  # Extra environment variables appended verbatim (e.g. channel IDs,
  # K8S_NAMESPACE, CONFIGMAP_NAME). Standard core/v1 EnvVar objects.
  extraEnv: []
  #   - name: DISCORD_CHANNEL_APPROVALS
  #     value: "123456789"
  # Resource limits
  resources: {}
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     cpu: 200m
  #     memory: 256Mi
  # Task queue for discord-bot activities
  taskQueue: "discord-bot"
  # Health probe port
  healthPort: 8080
  # Replica count
  replicas: 1

# ---------------------------------------------------------------------------
# GitHub Issue Poller(s)
# ---------------------------------------------------------------------------
# Each entry creates a separate poller deployment for one repository.
# GITHUB_TOKEN is shared across all pollers; repo-specific fields are per-entry.
poller:
  enabled: true
  # Shared GitHub token for all poller instances. Prefer `githubTokenSecret`
  # (a Kubernetes Secret reference) over the plain `githubToken` value.
  githubToken: ""
  # githubTokenSecret: { name: "agent-github-token", key: "GITHUB_TOKEN" }
  githubTokenSecret: {}
  image:
    repository: ghcr.io/omneval/devloop-poller
    tag: "latest"
    pullPolicy: IfNotPresent
  # Image pull secrets for a private poller image.
  imagePullSecrets: []
  # Persist poll state across restarts. Without this the poller re-notifies
  # every issue on each restart (the state file lives on an emptyDir otherwise).
  # When enabled, a PVC per poller deployment is created and mounted at
  # `mountPath`, and STATE_FILE points inside it.
  persistence:
    enabled: false
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 100Mi
    mountPath: /data
  # Resource limits (applied to all poller instances)
  resources: {}
  #   requests:
  #     cpu: 50m
  #     memory: 64Mi
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi
  # Health probe port
  healthPort: 8080
  # Seconds between poll cycles
  pollIntervalSeconds: 300
  # List of project configs. Each creates one poller deployment.
  #   - repo:       full GitHub repo name (e.g. "omneval/omneval")
  #   - label:      the agent trigger label (default: "agent-ready")
  #   - webhookUrl: URL of the temporal-worker webhook endpoint
  projects: []
  #   - repo: "org/repo"
  #     label: "agent-ready"
  #     webhookUrl: "http://devloop-temporal-worker.default.svc.cluster.local:8088/webhook/github"
