    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_DEFAULT_IMAGE
            # Chart.yaml's placeholder appVersion; the release pipeline
            # packages with --app-version <tag> so published charts pair the
