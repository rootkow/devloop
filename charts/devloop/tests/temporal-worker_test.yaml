suite: temporal worker deployment and service
templates:
  - templates/temporal-worker-deployment.yaml
  - templates/temporal-worker-service.yaml
tests:
  - it: fails when temporalHost is not provided
    # The validation helper is included in every template; helm aborts the whole
    # render at the first fail() call, which it attributes to this template.
    template: templates/temporal-worker-service.yaml
    set:
      temporalHost: ""
    asserts:
      - failedTemplate:
          errorMessage: "temporalHost is required but was not set. Provide a value like 'temporal-frontend.agents.svc:7233', or set temporal.enabled=true to deploy the bundled Temporal subchart"

  - it: defaults TEMPORAL_HOST to the bundled subchart frontend when temporal.enabled (issue #117)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: ""
      temporal.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_HOST
            value: "RELEASE-NAME-temporal-frontend.NAMESPACE.svc.cluster.local:7233"

  - it: explicit temporalHost wins over the bundled subchart default (issue #117)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "external-temporal.example.com:7233"
      temporal.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_HOST
            value: "external-temporal.example.com:7233"

  - it: honors temporal.fullnameOverride when deriving the subchart frontend host (issue #117)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: ""
      temporal.enabled: true
      temporal.fullnameOverride: "my-temporal"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_HOST
            value: "my-temporal-frontend.NAMESPACE.svc.cluster.local:7233"

  - it: renders nothing when the worker is disabled
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: names the workload and wires the temporal host
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: RELEASE-NAME-temporal-worker
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_HOST
            value: "temporal-frontend.agents.svc:7233"

  - it: appends extraEnv verbatim and sets the service account via serviceAccount.name
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.name: orchestration-worker
      temporalWorker.extraEnv:
        - name: EXTRA_VAR
          value: extra-value
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: orchestration-worker
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXTRA_VAR
            value: extra-value

  - it: defaults AGENTS_NAMESPACE to the release namespace
    template: templates/temporal-worker-deployment.yaml
    release:
      namespace: my-agents-ns
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENTS_NAMESPACE
            value: "my-agents-ns"

  - it: allows overriding AGENTS_NAMESPACE via agentsNamespace value
    template: templates/temporal-worker-deployment.yaml
    release:
      namespace: my-agents-ns
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      agentsNamespace: "agent-jobs"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENTS_NAMESPACE
            value: "agent-jobs"

  - it: exposes webhook and health ports on the service
    template: templates/temporal-worker-service.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.webhookPort: 8088
      temporalWorker.healthPort: 8080
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: RELEASE-NAME-temporal-worker
      - contains:
          path: spec.ports
          content:
            name: webhook
            port: 8088
            targetPort: webhook
            protocol: TCP

  - it: defaults the max questions per phase to 3
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_QUESTIONS_PER_PHASE
            value: "3"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GATE_TIMEOUT_SECONDS
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: QUESTION_TIMEOUT_SECONDS

  - it: renders the max questions per phase from values
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.maxQuestionsPerPhase: 5
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_QUESTIONS_PER_PHASE
            value: "5"

  - it: renders AGENT_SKILLS_BY_PHASE as JSON when skillsByPhase is set
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      skillsByPhase:
        plan: []
        execute:
          - tdd
          - code-review
        review:
          - code-review
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_BY_PHASE
            value: '{"execute":["tdd","code-review"],"plan":[],"review":["code-review"]}'

  - it: renders ci_fix in skillsByPhase
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      skillsByPhase:
        plan: []
        execute:
          - tdd
        ci_fix:
          - tdd
        review:
          - code-review
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_BY_PHASE
            value: '{"ci_fix":["tdd"],"execute":["tdd"],"plan":[],"review":["code-review"]}'

  - it: omits AGENT_SKILLS_BY_PHASE when skillsByPhase is empty (default)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_BY_PHASE

  - it: renders AGENT_SKILLS_SELECTION_MODE from skillsSelectionMode value
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      skillsSelectionMode: "advanced"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_SELECTION_MODE
            value: "advanced"

  - it: defaults AGENT_SKILLS_SELECTION_MODE to triggers when not set
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_SELECTION_MODE
            value: "triggers"

  - it: injects ORCHESTRATION_QUEUE matching taskQueue so webhook and worker use the same queue
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.taskQueue: "homelab-orchestration"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ORCHESTRATION_QUEUE
            value: "homelab-orchestration"

  - it: injects AGENT_JOB_SERVICE_ACCOUNT from temporalWorker.agentJob.serviceAccount.name
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.serviceAccount.name: "my-agent-sa"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_SERVICE_ACCOUNT
            value: "my-agent-sa"

  - it: sets serviceAccountName to the default (release-name-temporal-worker)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-temporal-worker

  - it: AGENT_JOB_SERVICE_ACCOUNT defaults to release-name-agent-job when no name is set
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_SERVICE_ACCOUNT
            value: "RELEASE-NAME-agent-job"

  - it: taskQueue defaults to devloop-orchestration
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TASK_QUEUE
            value: "devloop-orchestration"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ORCHESTRATION_QUEUE
            value: "devloop-orchestration"

  - it: injects AGENT_JOB_CPU and AGENT_JOB_MEMORY from agentJob.resources.requests
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.resources.requests.cpu: "500m"
      temporalWorker.agentJob.resources.requests.memory: "2Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_CPU
            value: "500m"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_MEMORY
            value: "2Gi"

  - it: injects AGENT_JOB_CPU_LIMIT and AGENT_JOB_MEMORY_LIMIT from agentJob.resources.limits
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.resources.limits.cpu: "1"
      temporalWorker.agentJob.resources.limits.memory: "2Gi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_CPU_LIMIT
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_MEMORY_LIMIT
            value: "2Gi"

  - it: omits all AGENT_JOB resource env vars when agentJob.resources is not set
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_CPU
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_MEMORY
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_CPU_LIMIT
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_MEMORY_LIMIT

  - it: injects LLM connection env vars from temporalWorker.agentJob.llm
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.llm.model: "openai/my-model"
      temporalWorker.agentJob.llm.baseUrl: "http://my-llm/v1"
      temporalWorker.agentJob.llm.apiKey: "sk-local"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_OPENAI_BASE_URL
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_MODEL
            value: "openai/my-model"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_LLM_BASE_URL
            value: "http://my-llm/v1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_LLM_API_KEY
            value: "sk-local"

  - it: injects GitHub App env vars from githubApp values (issue #81)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      githubApp.appId: "123456"
      githubApp.installationId: "987654"
      githubApp.privateKeySecret:
        name: devloop-github-app-key
        key: privateKey
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_ID
            value: "123456"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_INSTALLATION_ID
            value: "987654"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: devloop-github-app-key
                key: privateKey

  - it: omits GitHub App env vars when githubApp values are not set (PAT fallback, issue #81)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_ID
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_PRIVATE_KEY
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITHUB_APP_INSTALLATION_ID

  - it: defaults CI_FIX_MAX_ITERATIONS, EXECUTE_MAX_ITERATIONS and MAX_CONCURRENT_JOBS (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CI_FIX_MAX_ITERATIONS
            value: "5"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXECUTE_MAX_ITERATIONS
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CONCURRENT_JOBS
            value: "1"

  - it: renders CI_FIX_MAX_ITERATIONS, EXECUTE_MAX_ITERATIONS and MAX_CONCURRENT_JOBS from values (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.ciFixMaxIterations: 8
      temporalWorker.executeMaxIterations: 2
      temporalWorker.maxConcurrentJobs: 4
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CI_FIX_MAX_ITERATIONS
            value: "8"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXECUTE_MAX_ITERATIONS
            value: "2"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CONCURRENT_JOBS
            value: "4"

  - it: defaults REVIEW_FIX_MAX_ITERATIONS and AGENT_CRITERIA_MAX_PASSES
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REVIEW_FIX_MAX_ITERATIONS
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_CRITERIA_MAX_PASSES
            value: "2"

  - it: renders REVIEW_FIX_MAX_ITERATIONS and AGENT_CRITERIA_MAX_PASSES from values
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.reviewFixMaxIterations: 2
      temporalWorker.agentCriteriaMaxPasses: 3
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REVIEW_FIX_MAX_ITERATIONS
            value: "2"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_CRITERIA_MAX_PASSES
            value: "3"

  - it: defaults AGENT_GITHUB_LOGIN to devloop-bot (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_GITHUB_LOGIN
            value: "devloop-bot"

  - it: renders AGENT_GITHUB_LOGIN from temporalWorker.agentGithubLogin (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentGithubLogin: "custom-bot"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_GITHUB_LOGIN
            value: "custom-bot"

  - it: defaults GIT_AUTHOR_NAME and GIT_AUTHOR_EMAIL (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GIT_AUTHOR_NAME
            value: "devloop-bot"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GIT_AUTHOR_EMAIL
            value: "devloop-bot@omneval.com"

  - it: renders GIT_AUTHOR_NAME and GIT_AUTHOR_EMAIL from agent.gitName/agent.gitEmail (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      agent.gitName: "ci-bot"
      agent.gitEmail: "ci-bot@example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GIT_AUTHOR_NAME
            value: "ci-bot"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GIT_AUTHOR_EMAIL
            value: "ci-bot@example.com"

  - it: defaults SUMMARIZATION_ENABLED, SUMMARIZATION_CRON_SCHEDULE and omits SUMMARIZATION_WEBHOOK_URL (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SUMMARIZATION_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SUMMARIZATION_CRON_SCHEDULE
            value: "0 8 * * 1"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SUMMARIZATION_WEBHOOK_URL

  - it: omits the projects-config volume and mount when projectsConfigMap.name is not set
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notExists:
          path: spec.template.spec.volumes
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: mounts projects.yaml from a ConfigMap at projectsFile when projectsConfigMap.name is set (issue #101)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.projectsFile: "/etc/projects/projects.yaml"
      temporalWorker.projectsConfigMap:
        name: devloop-projects
        key: projects.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: projects-config
            configMap:
              name: devloop-projects
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: projects-config
            mountPath: "/etc/projects/projects.yaml"
            subPath: projects.yaml

  - it: defaults the projectsConfigMap key to projects.yaml when only the name is set (issue #101)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.projectsConfigMap.name: devloop-projects
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: projects-config
            mountPath: "/etc/projects/projects.yaml"
            subPath: projects.yaml

  - it: renders SUMMARIZATION_CRON_SCHEDULE and SUMMARIZATION_WEBHOOK_URL from summarization values (issue #93)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      summarization.cronSchedule: "0 9 * * 2"
      summarization.webhookUrl: "https://example.com/hook"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SUMMARIZATION_CRON_SCHEDULE
            value: "0 9 * * 2"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SUMMARIZATION_WEBHOOK_URL
            value: "https://example.com/hook"

  - it: renders AGENT_SKILLS_CONFIGMAP when skills value is non-empty (issue #34)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      skills:
        tdd: |
          ---
          name: tdd
          ---
          Content
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_CONFIGMAP
            value: "RELEASE-NAME-skills"

  - it: omits AGENT_SKILLS_CONFIGMAP when skills value is empty (issue #34)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_SKILLS_CONFIGMAP

  - it: defaults AGENT_JOB_ACTIVE_DEADLINE to 7200 when maxAgentRuntime is unset (issue #104)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_ACTIVE_DEADLINE
            value: "7200"

  - it: sets AGENT_JOB_ACTIVE_DEADLINE from temporalWorker.agentJob.maxAgentRuntime (issue #104)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.maxAgentRuntime: 10800
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_JOB_ACTIVE_DEADLINE
            value: "10800"

  - it: omits per-role LLM env when llm.roles is empty (default)
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_MODEL_REVIEW
          any: true

  - it: renders per-role LLM env from llm.roles
    template: templates/temporal-worker-deployment.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.llm.roles:
        review:
          model: "anthropic/claude-sonnet-4-6"
          baseUrl: "https://api.anthropic.com/v1/"
          apiKeySecret:
            name: anthropic-credentials
            key: api-key
        audit:
          model: "anthropic/claude-haiku-4-5"
          apiKey: "inline-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_MODEL_REVIEW
            value: "anthropic/claude-sonnet-4-6"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_LLM_BASE_URL_REVIEW
            value: "https://api.anthropic.com/v1/"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AGENT_LLM_API_KEY_REVIEW
            valueFrom:
