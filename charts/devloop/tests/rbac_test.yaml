suite: service accounts and RBAC
templates:
  - templates/serviceaccounts.yaml
  - templates/rbac.yaml
tests:
  # ─── Document count invariants ───────────────────────────────────────────────

  - it: serviceaccounts.yaml creates 3 SAs when all serviceAccount.create values are true
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - hasDocuments:
          count: 3

  - it: rbac.yaml creates 6 resources when all serviceAccount.create values are true
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - hasDocuments:
          count: 6

  - it: serviceaccounts.yaml skips temporal-worker SA when its serviceAccount.create is false
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2

  - it: rbac.yaml skips temporal-worker RBAC when its serviceAccount.create is false
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4

  - it: serviceaccounts.yaml skips discord-bot SA when its serviceAccount.create is false
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2

  - it: rbac.yaml skips discord-bot RBAC when its serviceAccount.create is false
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4

  - it: serviceaccounts.yaml skips agent-job SA when its serviceAccount.create is false
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2

  - it: rbac.yaml skips agent-job RBAC when its serviceAccount.create is false
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 4

  - it: renders no resources when all serviceAccount.create values are false
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
      discordBot.serviceAccount.create: false
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ─── ServiceAccount names (all enabled; indices fixed: 0=tw, 1=db, 2=aj) ───

  - it: temporal-worker SA is at index 0 with default name
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-temporal-worker

  - it: temporal-worker SA uses custom name when serviceAccount.name is set
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.name: "orchestration-worker"
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.name
          value: orchestration-worker

  - it: discord-bot SA is at index 1 with default name
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - documentIndex: 1
        isKind:
          of: ServiceAccount
      - documentIndex: 1
        equal:
          path: metadata.name
          value: RELEASE-NAME-discord-bot

  - it: discord-bot SA uses custom name when serviceAccount.name is set
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.name: "my-discord-sa"
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.name
          value: my-discord-sa

  - it: agent-job SA is at index 2 with default name
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - documentIndex: 2
        isKind:
          of: ServiceAccount
      - documentIndex: 2
        equal:
          path: metadata.name
          value: RELEASE-NAME-agent-job

  - it: agent-job SA uses custom name when serviceAccount.name is set
    template: templates/serviceaccounts.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.agentJob.serviceAccount.name: "my-agent-sa"
    asserts:
      - documentIndex: 2
        equal:
          path: metadata.name
          value: my-agent-sa

  # ─── temporal-worker Role + RoleBinding ────────────────────────────────────
  # Isolate: only temporal-worker enabled → rbac.yaml indices [0=Role, 1=RB].

  - it: creates temporal-worker Role with batch/configmap/pod/secret permissions
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.create: false
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - documentIndex: 0
        isKind:
          of: Role
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-temporal-worker
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "get", "list", "watch", "delete"]
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs/status"]
            verbs: ["get"]
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods", "pods/log"]
            verbs: ["get", "list", "watch"]
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list"]

  - it: creates temporal-worker RoleBinding binding SA to Role
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.create: false
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - documentIndex: 1
        isKind:
          of: RoleBinding
      - documentIndex: 1
        equal:
          path: metadata.name
          value: RELEASE-NAME-temporal-worker
      - documentIndex: 1
        equal:
          path: subjects[0].name
          value: RELEASE-NAME-temporal-worker
      - documentIndex: 1
        equal:
          path: roleRef.name
          value: RELEASE-NAME-temporal-worker

  # ─── discord-bot Role + RoleBinding ────────────────────────────────────────
  # Isolate: only discord-bot enabled → rbac.yaml indices [0=Role, 1=RB].

  - it: discord-bot Role allows configmap create and scoped get/update/patch
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
      temporalWorker.agentJob.serviceAccount.create: false
      discordBot.threadMapConfigMap: "my-thread-map"
    asserts:
      - documentIndex: 0
        isKind:
          of: Role
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-discord-bot
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["create"]
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            resourceNames: ["my-thread-map"]
            verbs: ["get", "update", "patch"]

  - it: creates discord-bot RoleBinding binding SA to Role
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
      temporalWorker.agentJob.serviceAccount.create: false
    asserts:
      - documentIndex: 1
        isKind:
          of: RoleBinding
      - documentIndex: 1
        equal:
          path: metadata.name
          value: RELEASE-NAME-discord-bot
      - documentIndex: 1
        equal:
          path: subjects[0].name
          value: RELEASE-NAME-discord-bot
      - documentIndex: 1
        equal:
          path: roleRef.name
          value: RELEASE-NAME-discord-bot

  # ─── agent-job Role + RoleBinding ──────────────────────────────────────────
  # Isolate: only agent-job enabled → rbac.yaml indices [0=Role, 1=RB].

  - it: agent-job Role allows configmaps create/get/update/patch
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
      discordBot.serviceAccount.create: false
    asserts:
      - documentIndex: 0
        isKind:
          of: Role
      - documentIndex: 0
        equal:
          path: metadata.name
          value: RELEASE-NAME-agent-job
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["create", "get", "update", "patch"]

  - it: creates agent-job RoleBinding binding SA to Role
    template: templates/rbac.yaml
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      temporalWorker.serviceAccount.create: false
      discordBot.serviceAccount.create: false
    asserts:
      - documentIndex: 1
        isKind:
          of: RoleBinding
      - documentIndex: 1
        equal:
          path: metadata.name
          value: RELEASE-NAME-agent-job
      - documentIndex: 1
        equal:
          path: subjects[0].name
          value: RELEASE-NAME-agent-job
      - documentIndex: 1
        equal:
          path: roleRef.name
          value: RELEASE-NAME-agent-job

