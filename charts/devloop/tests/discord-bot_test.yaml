suite: discord bot deployment
templates:
  - templates/discord-bot-deployment.yaml
tests:
  - it: renders nothing when the bot is disabled
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sources the token from a Secret when tokenSecret is set
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.tokenSecret:
        name: discord-homelab-agent-bot
        key: TOKEN
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: RELEASE-NAME-discord-bot
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_TOKEN
            valueFrom:
              secretKeyRef:
                name: discord-homelab-agent-bot
                key: TOKEN

  - it: falls back to a plain token value when no secret is given
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.tokenSecret: {}
      discordBot.token: "plain-token"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_TOKEN
            value: "plain-token"

  - it: injects K8S_NAMESPACE via the downward API so the thread store uses the right namespace
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K8S_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

  - it: injects CONFIGMAP_NAME from discordBot.threadMapConfigMap
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.threadMapConfigMap: my-thread-map
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIGMAP_NAME
            value: my-thread-map

  - it: injects Discord channel IDs from discordBot.channels values
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.channels.approvals: "111111111111111111"
      discordBot.channels.alerts: "222222222222222222"
      discordBot.channels.changelog: "333333333333333333"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_CHANNEL_APPROVALS
            value: "111111111111111111"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_CHANNEL_ALERTS
            value: "222222222222222222"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISCORD_CHANNEL_CHANGELOG
            value: "333333333333333333"

  - it: sets serviceAccountName to the default (release-name-discord-bot)
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-discord-bot

  - it: sets serviceAccountName to the custom name when serviceAccount.name is set
    set:
      temporalHost: "temporal-frontend.agents.svc:7233"
      discordBot.serviceAccount.name: "my-discord-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-discord-sa
