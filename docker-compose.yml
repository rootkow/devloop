# Temporal dev infrastructure for the local quickstart (issue #116).
#
# Usage:
#   docker compose up -d
#
# Starts a Temporal server on localhost:7233 and the Temporal Web UI on
# http://localhost:8233, replacing the need for the Temporal CLI
# (`temporal server start-dev`) in docs/local-quickstart.md.
#
# This mirrors the official temporalio/docker-compose postgres stack —
# evaluation-grade only (single node, throwaway volume).

services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      - postgresql
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233    

volumes:
  temporal-pgdata:
